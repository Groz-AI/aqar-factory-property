# Keeps a free-tier Supabase project awake so it never pauses from inactivity.
# Setup: in your GitHub repo → Settings → Secrets and variables → Actions,
# add two repository secrets:
#   SUPABASE_URL       = https://<your-project>.supabase.co
#   SUPABASE_ANON_KEY  = your anon / public key
name: Supabase keep-alive

on:
  schedule:
    - cron: "0 6 */3 * *"   # every 3 days at 06:00 UTC
  workflow_dispatch:         # lets you run it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Touch the database
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ] || [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "SUPABASE_URL / SUPABASE_ANON_KEY secrets are not set — skipping."
            exit 0
          fi
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/categories?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase responded with HTTP $code"
          # 2xx keeps the project active; anything else fails the run so you get notified
          case "$code" in
            2*) echo "Project is awake."; ;;
            *) echo "Unexpected status $code"; exit 1; ;;
          esac
