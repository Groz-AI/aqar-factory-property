<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in · Realteek Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Hanken+Grotesk:wght@400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
  <script src="../i18n.js"></script>
</head>
<body>
  <button class="lang-switch admin-lang-switch" id="langSwitch" type="button"></button>
  <main class="login-screen">
    <div class="login-card">
      <div class="login-brand">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></svg>
        <span>Realteek</span>
      </div>
      <h1 data-i18n>Welcome back</h1>
      <p class="muted" data-i18n>Sign in to manage your listings, projects and site content.</p>

      <form id="loginForm" autocomplete="on">
        <div class="field">
          <label for="email" data-i18n>Email address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="username" />
        </div>
        <div class="field">
          <label for="password" data-i18n>Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn" data-i18n>Sign in</button>
        <div class="form-msg" id="msg"></div>
      </form>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../config.js"></script>
  <script src="../local-backend.js"></script>
  <script>
  (function () {
    const cfg = window.SUPA || {};
    const cloud = window.supabase && cfg.url && !/YOUR_/.test(cfg.url) && cfg.anonKey && !/YOUR_/.test(cfg.anonKey);
    const localMode = !cloud && !!window.RealteekLocal;
    const form = document.getElementById('loginForm');
    const btn  = document.getElementById('loginBtn');
    const msg  = document.getElementById('msg');

    const t = window.t || ((s) => s);
    function show(text, kind) { msg.textContent = text; msg.className = 'form-msg ' + kind; }

    if (!cloud && !localMode) {
      show(t('Supabase isn’t configured yet. Add your project URL and anon key in config.js, then run supabase/schema.sql.'), 'err');
      btn.disabled = true;
      btn.style.opacity = .6;
      return;
    }

    if (localMode) {
      const c = window.RealteekLocal.getCred();
      const hint = document.createElement('p');
      hint.className = 'muted';
      hint.style.cssText = 'margin-top:14px;font-size:.85rem;padding:10px 12px;background:rgba(46,155,221,.08);border-radius:10px';
      hint.innerHTML = t('Demo mode (no server). Sign in with') + '<br><b>' + c.email + '</b> / <b>' + c.password + '</b>';
      form.appendChild(hint);
      // prefill for convenience
      document.getElementById('email').value = c.email;
    }

    // sessionStorage (not localStorage) — admin sessions end when the tab/browser
    // closes, so every new browser session requires a fresh sign-in
    const sb = cloud ? window.supabase.createClient(cfg.url, cfg.anonKey, { auth: { storage: window.sessionStorage } })
             : window.RealteekLocal.makeClient();

    // already signed in? skip straight to the dashboard
    sb.auth.getSession().then(({ data }) => {
      if (data && data.session) location.replace('dashboard.html');
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      btn.disabled = true;
      const original = btn.textContent;
      btn.innerHTML = '<span class="spinner"></span>';
      msg.className = 'form-msg';

      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        show(error.message || t('Sign in failed. Check your credentials.'), 'err');
        btn.disabled = false; btn.textContent = original;
        return;
      }

      // confirm this user is an allow-listed admin
      const { data: isAdmin, error: rpcErr } = await sb.rpc('is_admin');
      if (rpcErr || !isAdmin) {
        await sb.auth.signOut();
        show(t('This account doesn’t have admin access.'), 'err');
        btn.disabled = false; btn.textContent = original;
        return;
      }

      show(t('Signed in. Redirecting…'), 'ok');
      location.replace('dashboard.html');
    });
  })();
  </script>
</body>
</html>
